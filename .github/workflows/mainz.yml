name: Build ${repoName}

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  code-quality:
    name: Code Quality (Lint & Analysis)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y clang-format cppcheck

      - name: Code Formatting (clang-format)
        run: find . -regex '.*\.\(cpp\|hpp\|c\|h\)' -exec clang-format --dry-run -Werror {} +

      - name: Static Analysis (cppcheck)
        run: cppcheck --enable=all --inconclusive --force --inline-suppr .

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    needs: [code-quality]
    strategy:
      matrix:
        qt_version: ['6.5.3']
        arch: ['win64_msvc2019_64']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Qt
        uses: actions/cache@v4
        with:
          path: ${{ runner.workspace }}/Qt
          key: ${{ runner.os }}-Qt-${{ matrix.qt_version }}-${{ matrix.arch }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.arch }}
          cached: ${{ steps.cache-qt.outputs.cache-hit }}

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27.x'

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        working-directory: build
        run: ctest -C Release --output-on-failure

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${repoName}-Windows-${{ matrix.arch }}
          path: |
            build/Release/
            build/release/
