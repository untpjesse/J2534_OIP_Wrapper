name: One-Click Build (DLL & App)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # Download and extract a true 32-bit MinGW compiler
      - name: Setup 32-bit MinGW
        run: |
          Invoke-WebRequest -Uri "https://github.com/niXman/mingw-builds-binaries/releases/download/13.2.0-rt_v11-rev1/i686-13.2.0-release-posix-dwarf-ucrt-rt_v11-rev1.7z" -OutFile "mingw32.7z"
          7z x mingw32.7z -oC:\ -y
          echo "C:\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win32_mingw81'

      - name: Patch Source Code
        run: |
          # Fix C++23 .contains() usage for older compilers in j2534cannelloniclient.cpp
          $clientFile = "j2534_OverIP\j2534cannelloniclient.cpp"
          if (Test-Path $clientFile) {
            (Get-Content $clientFile) -replace '\.contains\("(\d+)"\)', '.find("$1") != std::string::npos' | Set-Content $clientFile
            Write-Host "Patched .contains() in $clientFile"
          }
          
      - name: Download and Build cn-cbor
        run: |
          git clone https://github.com/jimsch/cn-cbor.git
          # Patch ALL .c files to use winsock2.h instead of arpa/inet.h
          Get-ChildItem -Path cn-cbor\src\*.c | ForEach-Object {
              (Get-Content $_.FullName) -replace '<arpa/inet.h>', '<winsock2.h>' | Set-Content $_.FullName
          }
          cd cn-cbor
          mkdir build
          cd build
          cmake -G "MinGW Makefiles" -DCMAKE_C_COMPILER="C:/mingw32/bin/gcc.exe" -DCMAKE_CXX_COMPILER="C:/mingw32/bin/g++.exe" -DCN_CBOR_BUILD_TESTS=OFF ..
          C:\mingw32\bin\mingw32-make.exe
          # Search for the library and copy it to the root directory
          Get-ChildItem -Path . -Filter "libcn-cbor.a" -Recurse | Copy-Item -Destination ..\..\
          
      - name: Build Wrapper DLL
        run: |
          cd j2534_OverIP
          qmake j2534_OverIP.pro QMAKE_CXX="C:/mingw32/bin/g++.exe" QMAKE_CC="C:/mingw32/bin/gcc.exe" QMAKE_LINK="C:/mingw32/bin/g++.exe"
          C:\mingw32\bin\mingw32-make.exe release
          
      - name: Build GUI App
        run: |
          cd j2534_OverIP_App
          qmake j2534_OverIP_App.pro QMAKE_CXX="C:/mingw32/bin/g++.exe" QMAKE_CC="C:/mingw32/bin/gcc.exe" QMAKE_LINK="C:/mingw32/bin/g++.exe"
          C:\mingw32\bin\mingw32-make.exe release
          
      - name: Upload Compiled Files
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-J2534-Windows
          path: |
            j2534_OverIP/release/*.dll
            j2534_OverIP_App/release/*.exe
