name: One-Click Build (DLL & App)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # Download and extract a true 32-bit MinGW compiler
      - name: Setup 32-bit MinGW
        run: |
          Invoke-WebRequest -Uri "https://github.com/niXman/mingw-builds-binaries/releases/download/13.2.0-rt_v11-rev1/i686-13.2.0-release-posix-dwarf-ucrt-rt_v11-rev1.7z" -OutFile "mingw32.7z"
          7z x mingw32.7z -oC:\ -y
          echo "C:\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win32_mingw81'

      - name: Patch Source Code
        run: |
          # Fix C++23 .contains() usage for older compilers
          $clientFile = "j2534_OverIP\j2534cannelloniclient.cpp"
          if (Test-Path $clientFile) {
            (Get-Content $clientFile) -replace '\.contains\("(\d+)"\)', '.find("$1") != std::string::npos' | Set-Content $clientFile
          }
          
          # Fix uint32_t vs unsigned long mismatch in j2534.cpp
          $j2534cpp = "j2534_OverIP\j2534.cpp"
          if (Test-Path $j2534cpp) {
            (Get-Content $j2534cpp) -replace 'uint32_t', 'unsigned long' | Set-Content $j2534cpp
          }
          
          # Add extern "C" to J2534_EXPORT so functions aren't C++ mangled
          $globalHeader = "j2534_OverIP\j2534_OverIP_global.h"
          if (Test-Path $globalHeader) {
            (Get-Content $globalHeader) -replace 'define J2534_EXPORT int32_t __stdcall', 'define J2534_EXPORT extern "C" int32_t __stdcall' | Set-Content $globalHeader
          }
          
          # Rewrite exports.def to map the exact 32-bit stdcall names to the clean undecorated names
          $defContent = @"
          LIBRARY j2534_OverIP
          EXPORTS
              PassThruOpen=__PassThruOpen@8
              PassThruClose=__PassThruClose@4
              PassThruConnect=__PassThruConnect@20
              PassThruDisconnect=__PassThruDisconnect@4
              PassThruReadMsgs=__PassThruReadMsgs@16
              PassThruWriteMsgs=__PassThruWriteMsgs@16
              PassThruStartPeriodicMsg=__PassThruStartPeriodicMsg@16
              PassThruStopPeriodicMsg=__PassThruStopPeriodicMsg@8
              PassThruStartMsgFilter=__PassThruStartMsgFilter@24
              PassThruStopMsgFilter=__PassThruStopMsgFilter@8
              PassThruSetProgrammingVoltage=__PassThruSetProgrammingVoltage@12
              PassThruReadVersion=__PassThruReadVersion@16
              PassThruGetLastError=__PassThruGetLastError@4
              PassThruIoctl=__PassThruIoctl@16
          "@
          Set-Content -Path "j2534_OverIP\exports.def" -Value $defContent
          
      - name: Build cn-cbor library
        run: |
          git clone https://github.com/jimsch/cn-cbor.git
          
          # Patch for Windows networking headers
          Get-ChildItem -Path cn-cbor\src\*.c | ForEach-Object {
              (Get-Content $_.FullName) -replace '<arpa/inet.h>', '<winsock2.h>' | Set-Content $_.FullName
          }
          
          cd cn-cbor\src
          # Compile object files directly with GCC
          C:\mingw32\bin\gcc.exe -c *.c -I../include -O2
          # Archive into static library
          C:\mingw32\bin\ar.exe rcs libcn-cbor.a *.o
          
          # Copy to all possible paths the linker might check
          copy libcn-cbor.a $env:GITHUB_WORKSPACE\
          copy libcn-cbor.a $env:GITHUB_WORKSPACE\..\
          copy libcn-cbor.a $env:GITHUB_WORKSPACE\j2534_OverIP\
          
      - name: Build Wrapper DLL
        run: |
          # Force the linker to check the Windows networking library AFTER cn-cbor
          Add-Content -Path "j2534_OverIP\j2534_OverIP.pro" -Value "`nLIBS += -lws2_32"
          
          cd j2534_OverIP
          qmake j2534_OverIP.pro QMAKE_CXX="C:/mingw32/bin/g++.exe" QMAKE_CC="C:/mingw32/bin/gcc.exe" QMAKE_LINK="C:/mingw32/bin/g++.exe"
          C:\mingw32\bin\mingw32-make.exe release
          
      - name: Build GUI App
        run: |
          cd j2534_OverIP_App
          qmake j2534_OverIP_App.pro QMAKE_CXX="C:/mingw32/bin/g++.exe" QMAKE_CC="C:/mingw32/bin/gcc.exe" QMAKE_LINK="C:/mingw32/bin/g++.exe"
          C:\mingw32\bin\mingw32-make.exe release
          
      - name: Upload Compiled Files
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-J2534-Windows
          path: |
            j2534_OverIP/release/*.dll
            j2534_OverIP_App/release/*.exe
