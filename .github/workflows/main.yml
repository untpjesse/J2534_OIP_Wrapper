name: One-Click Build (DLL & App)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # Download and extract a true 32-bit MinGW compiler, auto-overwriting conflicts
      - name: Setup 32-bit MinGW
        run: |
          Invoke-WebRequest -Uri "https://github.com/niXman/mingw-builds-binaries/releases/download/13.2.0-rt_v11-rev1/i686-13.2.0-release-posix-dwarf-ucrt-rt_v11-rev1.7z" -OutFile "mingw32.7z"
          7z x mingw32.7z -oC:\ -y
          echo "C:\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win32_mingw81'
          
      - name: Build Wrapper DLL
        run: |
          cd j2534_OverIP
          qmake j2534_OverIP.pro
          mingw32-make release
          
      - name: Build GUI App
        run: |
          cd j2534_OverIP_App
          qmake j2534_OverIP_App.pro
          mingw32-make release
          
      - name: Upload Compiled Files
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-J2534-Windows
          path: |
            j2534_OverIP/release/*.dll
            j2534_OverIP_App/release/*.exe
